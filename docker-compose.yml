services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    container_name: workbrain-postgres
    environment:
      POSTGRES_USER: workbrain
      POSTGRES_PASSWORD: workbrain123
      POSTGRES_DB: workbrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbrain -d workbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: workbrain-api
    environment:
      DATABASE_URL: postgresql+psycopg://workbrain:workbrain123@postgres:5432/workbrain
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      UPLOAD_DIR: /app/uploads
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.45}
      RAG_MAX_DOCUMENT_CHARS: ${RAG_MAX_DOCUMENT_CHARS:-20000}
      RAG_MAX_CHUNKS_PER_DOCUMENT: ${RAG_MAX_CHUNKS_PER_DOCUMENT:-50}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
