services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    container_name: workbrain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-workbrain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2.7-alpine
    container_name: workbrain-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  uploads-init:
    build: .
    user: "0:0"
    command: ["sh", "-c", "chown -R 1000:1000 /app/uploads"]
    restart: "no"
    volumes:
      - uploads_data:/app/uploads

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SQL_ECHO: ${SQL_ECHO:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    container_name: workbrain-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SQL_ECHO: ${SQL_ECHO:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_MAX_TOKENS: ${DEEPSEEK_MAX_TOKENS:-800}
      CHAT_HISTORY_MAX_CHARS: ${CHAT_HISTORY_MAX_CHARS:-4000}
      DEEPSEEK_INPUT_CACHE_HIT_PRICE_PER_1M_USD: ${DEEPSEEK_INPUT_CACHE_HIT_PRICE_PER_1M_USD:-0}
      DEEPSEEK_INPUT_CACHE_MISS_PRICE_PER_1M_USD: ${DEEPSEEK_INPUT_CACHE_MISS_PRICE_PER_1M_USD:-0}
      DEEPSEEK_OUTPUT_PRICE_PER_1M_USD: ${DEEPSEEK_OUTPUT_PRICE_PER_1M_USD:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.45}
      RAG_MAX_DOCUMENT_CHARS: ${RAG_MAX_DOCUMENT_CHARS:-20000}
      RAG_MAX_CHUNKS_PER_DOCUMENT: ${RAG_MAX_CHUNKS_PER_DOCUMENT:-50}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DOCUMENT_PROCESSING_MAX_RETRIES: ${DOCUMENT_PROCESSING_MAX_RETRIES:-3}
      DOCUMENT_PROCESSING_RETRY_BASE_SECONDS: ${DOCUMENT_PROCESSING_RETRY_BASE_SECONDS:-5}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      uploads-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: workbrain-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy

  gateway:
    image: caddy:2.10-alpine
    container_name: workbrain-gateway
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      frontend:
        condition: service_healthy

  worker:
    build: .
    container_name: workbrain-worker
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.celery_app:celery_app
      - worker
      - --loglevel=INFO
      - --queues=celery,document_processing
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SQL_ECHO: ${SQL_ECHO:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      RAG_MAX_DOCUMENT_CHARS: ${RAG_MAX_DOCUMENT_CHARS:-20000}
      RAG_MAX_CHUNKS_PER_DOCUMENT: ${RAG_MAX_CHUNKS_PER_DOCUMENT:-50}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DOCUMENT_PROCESSING_MAX_RETRIES: ${DOCUMENT_PROCESSING_MAX_RETRIES:-3}
      DOCUMENT_PROCESSING_RETRY_BASE_SECONDS: ${DOCUMENT_PROCESSING_RETRY_BASE_SECONDS:-5}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        - CMD-SHELL
        - "celery -A app.celery_app:celery_app inspect ping --destination celery@$$HOSTNAME --timeout=5 | grep -q pong"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      uploads-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    name: workbrain_postgres_data
  redis_data:
    name: workbrain_redis_data
  uploads_data:
    name: workbrain_uploads_data
  caddy_data:
    name: workbrain_caddy_data
  caddy_config:
    name: workbrain_caddy_config
